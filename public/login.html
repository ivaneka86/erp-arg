<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyARG - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0f2952 0%,#1a3f7a 50%,#2563eb 100%);
      position:relative;overflow:hidden;}
    body::before{content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse at 20% 50%,rgba(96,165,250,0.15) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,rgba(37,99,235,0.2) 0%,transparent 50%);
      pointer-events:none;}
    .circles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
    .circle{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.06);}
    .c1{width:400px;height:400px;top:-100px;right:-100px;}
    .c2{width:250px;height:250px;bottom:-50px;left:-50px;}
    .c3{width:150px;height:150px;top:40%;left:5%;}

    .card{background:white;border-radius:20px;padding:44px 40px 36px;width:100%;max-width:420px;
      box-shadow:0 24px 60px rgba(0,0,0,0.3);position:relative;z-index:10;
      animation:slideUp .4s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .logo-wrap{text-align:center;margin-bottom:28px;}
    .logo-wrap img{height:52px;width:auto;}
    .logo-wrap .subtitle{font-size:11px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}

    .divider{height:1px;background:#e8f0ff;margin-bottom:24px;}

    label{display:block;font-size:12.5px;font-weight:600;color:#374151;margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:18px;}
    .input-wrap input{width:100%;padding:11px 40px 11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;
      font-size:13.5px;font-family:inherit;color:#1e293b;outline:none;transition:border .2s,box-shadow .2s;}
    .input-wrap input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:2px;}
    .toggle-pw:hover{color:#2563eb;}

    .forgot{text-align:right;margin-top:-10px;margin-bottom:20px;}
    .forgot a{font-size:12px;color:#2563eb;text-decoration:none;font-weight:500;}
    .forgot a:hover{text-decoration:underline;}

    .btn-login{width:100%;padding:13px;background:linear-gradient(90deg,#1a3f7a,#2563eb);
      color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;
      cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px;}
    .btn-login:hover{opacity:.92;}
    .btn-login:active{transform:scale(.99);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;}

    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;
      border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;display:none;}
    .success-msg{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;
      border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;display:none;}

    .footer-text{text-align:center;font-size:11.5px;color:#94a3b8;margin-top:20px;}

    /* Modal lupa password */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;
      display:none;align-items:center;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal{background:white;border-radius:16px;padding:32px;width:360px;
      box-shadow:0 20px 50px rgba(0,0,0,0.3);animation:slideUp .3s ease;}
    .modal h3{font-size:17px;font-weight:700;color:#0f2952;margin-bottom:8px;}
    .modal p{font-size:12.5px;color:#64748b;margin-bottom:20px;line-height:1.6;}
    .modal .btn-send{width:100%;padding:11px;background:#2563eb;color:white;border:none;
      border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
    .modal .btn-cancel{width:100%;padding:11px;background:#f1f5f9;color:#374151;border:none;
      border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
    .modal .btn-send:hover{background:#1d4ed8;}
    .modal .btn-cancel:hover{background:#e2e8f0;}
  </style>
</head>

    <div class="subtitle">Enterprise Resource System</div>
  </div>
  <div class="divider"></div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div>
    <label for="username">Username</label>
    <div class="input-wrap">
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="username"/>
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
      <button class="toggle-pw" id="togglePw" type="button" title="Tampilkan/sembunyikan password">👁</button>
    </div>

    <div class="forgot"><a href="#" onclick="showForgot()">Lupa password?</a></div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">Masuk</button>
  </div>

  <div class="footer-text">PT Amanda Retailindo Group &copy; 2026</div>
</div>

<!-- Modal Lupa Password -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal">
    <h3>🔑 Lupa Password</h3>
    <p>Masukkan username Anda. Kami akan mengirimkan link reset password ke email terdaftar.</p>
    <label for="forgotUser">Username</label>
    <div class="input-wrap" style="margin-bottom:16px;">
      <input type="text" id="forgotUser" placeholder="Masukkan username"/>
    </div>
    <div class="error-msg" id="forgotError"></div>
    <div class="success-msg" id="forgotSuccess"></div>
    <button class="btn-send" onclick="sendForgot()">Kirim Link Reset</button>
    <button class="btn-cancel" onclick="closeForgot()">Batal</button>
  </div>
</div>

<script>
  // Toggle password
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const isHidden = pw.type === 'password';
    pw.type = isHidden ? 'text' : 'password';
    this.textContent = isHidden ? '🙈' : '👁';
  });

  // Enter key login
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const errEl    = document.getElementById('errorMsg');
    const sucEl    = document.getElementById('successMsg');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!username || !password) {
      errEl.textContent = 'Username dan password wajib diisi.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.message || 'Login gagal.';
        errEl.style.display = 'block';
      } else {
        localStorage.setItem('myarg_token', data.token);
        localStorage.setItem('myarg_user', JSON.stringify(data.user));
        sucEl.textContent = 'Login berhasil! Mengalihkan...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = '/dashboard', 800);
      }
    } catch (err) {
      errEl.textContent = 'Tidak dapat terhubung ke server.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Masuk';
    }
  }

  function showForgot() {
    document.getElementById('forgotModal').classList.add('show');
    document.getElementById('forgotUser').value = document.getElementById('username').value;
  }
  function closeForgot() {
    document.getElementById('forgotModal').classList.remove('show');
    document.getElementById('forgotError').style.display = 'none';
    document.getElementById('forgotSuccess').style.display = 'none';
  }

  async function sendForgot() {
    const username = document.getElementById('forgotUser').value.trim();
    const errEl = document.getElementById('forgotError');
    const sucEl = document.getElementById('forgotSuccess');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!username) {
      errEl.textContent = 'Username wajib diisi.';
      errEl.style.display = 'block';
      return;
    }
    try {
      const res  = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.message;
        errEl.style.display = 'block';
      } else {
        sucEl.textContent = data.message;
        sucEl.style.display = 'block';
      }
    } catch {
      errEl.textContent = 'Tidak dapat terhubung ke server.';
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
